<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>RestaurantHub - Forgot Password</title>
  <link rel="stylesheet" href="assets/css/style.css">
</head>
<body>
  <div id="navbar"></div>

  <main class="container">
    <section class="auth-box">
      <div class="form-card">
        <h1 class="page-title">Forgot Password</h1>
        <p class="page-subtitle">
          Enter your account email to generate a reset PIN.
        </p>

        <div id="forgotPasswordMessage" class="message hide"></div>

        <form id="forgotPasswordForm" class="form-grid" novalidate>
          <div class="form-group full">
            <label for="forgotPasswordEmail">Account Email</label>
            <input id="forgotPasswordEmail" type="email" required>
          </div>

          <div class="form-group full">
            <button class="btn btn-primary" id="forgotPasswordBtn" type="submit">
              Generate Reset PIN
            </button>
          </div>
        </form>
      </div>
    </section>
  </main>

  <div id="footer"></div>

  <script src="assets/js/api.js"></script>
  <script src="assets/js/main.js"></script>
  <script src="assets/js/auth.js"></script>
</body>
</html>
