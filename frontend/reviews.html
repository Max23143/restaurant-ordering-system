<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>RestaurantHub - Reviews</title>
  <link rel="stylesheet" href="assets/css/style.css">
</head>
<body>
  <div id="navbar"></div>

  <main class="container">
    <div class="page-header">
      <h1 class="page-title">Reviews and Ratings</h1>
      <p class="page-subtitle">Customers can rate dishes and share feedback.</p>
    </div>

    <div class="grid grid-2 section">
      <section class="form-card">
        <h2 class="section-title">Leave a Review</h2>
        <div id="reviewMessage" class="message hide"></div>

        <form id="reviewForm" class="form-grid" novalidate>
          <div class="form-group full">
            <label for="reviewMenuItem">Menu Item</label>
            <select id="reviewMenuItem" required></select>
          </div>

          <div class="form-group">
            <label for="rating">Rating</label>
            <select id="rating" required>
              <option value="5">5 - Excellent</option>
              <option value="4">4 - Very Good</option>
              <option value="3">3 - Good</option>
              <option value="2">2 - Fair</option>
              <option value="1">1 - Poor</option>
            </select>
          </div>

          <div class="form-group full">
            <label for="comment">Comment</label>
            <textarea id="comment" placeholder="Write your feedback"></textarea>
          </div>

          <div class="form-group full">
            <button class="btn btn-primary" id="reviewBtn" type="submit">Submit Review</button>
          </div>
        </form>
      </section>

      <section>
        <h2 class="section-title">My Reviews</h2>
        <div id="myReviews" class="list"></div>
      </section>
    </div>
  </main>

  <div id="footer"></div>

  <script src="assets/js/api.js"></script>
  <script src="assets/js/recommendation.js"></script>
  <script src="assets/js/main.js"></script>
  <script src="assets/js/reviews.js"></script>
</body>
</html>
