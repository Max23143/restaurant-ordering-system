<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>RestaurantHub - Register</title>
  <link rel="stylesheet" href="assets/css/style.css">
</head>
<body>
  <div id="navbar"></div>

  <main class="container">
    <section class="auth-box">
      <div class="form-card">
        <h1 class="page-title">Register</h1>
        <p class="page-subtitle">Create an account for ordering and recommendations.</p>

        <div id="authMessage" class="message hide"></div>

        <form id="registerForm" class="form-grid" novalidate>
          <div class="form-group full">
            <label for="registerName">Full Name</label>
            <input id="registerName" type="text" required>
          </div>

          <div class="form-group full">
            <label for="registerEmail">Email</label>
            <input id="registerEmail" type="email" required>
          </div>

          <div class="form-group">
            <label for="registerCountryCode">Country Code</label>
            <select id="registerCountryCode" required>
              <option value="+44">United Kingdom (+44)</option>
              <option value="+1">United States/Canada (+1)</option>
              <option value="+61">Australia (+61)</option>
              <option value="+64">New Zealand (+64)</option>
              <option value="+91">India (+91)</option>
              <option value="+977">Nepal (+977)</option>
              <option value="+880">Bangladesh (+880)</option>
              <option value="+94">Sri Lanka (+94)</option>
              <option value="+92">Pakistan (+92)</option>
              <option value="+971">UAE (+971)</option>
              <option value="+966">Saudi Arabia (+966)</option>
              <option value="+974">Qatar (+974)</option>
              <option value="+968">Oman (+968)</option>
              <option value="+965">Kuwait (+965)</option>
              <option value="+973">Bahrain (+973)</option>
              <option value="+49">Germany (+49)</option>
              <option value="+33">France (+33)</option>
              <option value="+39">Italy (+39)</option>
              <option value="+34">Spain (+34)</option>
              <option value="+31">Netherlands (+31)</option>
              <option value="+32">Belgium (+32)</option>
              <option value="+41">Switzerland (+41)</option>
              <option value="+46">Sweden (+46)</option>
              <option value="+47">Norway (+47)</option>
              <option value="+45">Denmark (+45)</option>
              <option value="+353">Ireland (+353)</option>
              <option value="+351">Portugal (+351)</option>
              <option value="+48">Poland (+48)</option>
              <option value="+43">Austria (+43)</option>
              <option value="+90">Turkey (+90)</option>
              <option value="+86">China (+86)</option>
              <option value="+81">Japan (+81)</option>
              <option value="+82">South Korea (+82)</option>
              <option value="+65">Singapore (+65)</option>
              <option value="+60">Malaysia (+60)</option>
              <option value="+66">Thailand (+66)</option>
              <option value="+84">Vietnam (+84)</option>
              <option value="+63">Philippines (+63)</option>
              <option value="+27">South Africa (+27)</option>
              <option value="+20">Egypt (+20)</option>
              <option value="+234">Nigeria (+234)</option>
              <option value="+254">Kenya (+254)</option>
              <option value="+55">Brazil (+55)</option>
              <option value="+52">Mexico (+52)</option>
              <option value="+54">Argentina (+54)</option>
            </select>
          </div>

          <div class="form-group">
            <label for="registerPhoneLocal">Phone Number</label>
            <input id="registerPhoneLocal" type="text" placeholder="Enter phone number without country code" required>
          </div>

          <div class="form-group full">
            <label for="registerPassword">Password</label>
            <input id="registerPassword" type="password" required>
          </div>

          <div class="form-group full">
            <button class="btn btn-primary" id="registerBtn" type="submit">Register</button>
          </div>
        </form>
      </div>
    </section>
  </main>

  <div id="footer"></div>

  <script src="assets/js/api.js"></script>
  <script src="assets/js/recommendation.js"></script>
  <script src="assets/js/main.js"></script>
  <script src="assets/js/auth.js"></script>
</body>
</html>
