<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>RestaurantHub - Register</title>
  <link rel="stylesheet" href="assets/css/style.css">
</head>
<body>
  <div id="navbar"></div>

  <main class="container">
    <section class="auth-box">
      <div class="form-card">
        <h1 class="page-title">Register</h1>
        <p class="page-subtitle">Create an account for ordering and recommendations.</p>

        <div id="authMessage" class="message hide"></div>

        <form id="registerForm" class="form-grid" novalidate>
          <div class="form-group full">
            <label for="registerName">Full Name</label>
            <input id="registerName" type="text" required>
          </div>

          <div class="form-group full">
            <label for="registerEmail">Email</label>
            <input id="registerEmail" type="email" required>
          </div>

          <div class="form-group full">
            <label for="registerPhone">Phone Number</label>
            <input id="registerPhone" type="text" placeholder="+447xxxxxxxxx" required>
          </div>

          <div class="form-group full">
            <label for="registerPassword">Password</label>
            <input id="registerPassword" type="password" required>
          </div>

          <div class="form-group full">
            <button class="btn btn-primary" id="registerBtn" type="submit">Send OTP</button>
          </div>
        </form>

        <div id="otpSection" class="form-card hide" style="margin-top: 1rem; background: #fffaf5;">
          <h2 class="section-title" style="font-size: 1.3rem; margin-bottom: 0.5rem;">Verify OTP</h2>
          <p class="page-subtitle" style="margin-bottom: 1rem;">
            Enter the OTP sent to your phone number.
          </p>

          <form id="verifyOtpForm" class="form-grid" novalidate>
            <div class="form-group full">
              <label for="registerOtp">OTP Code</label>
              <input id="registerOtp" type="text" maxlength="6" placeholder="Enter 6-digit OTP" required>
            </div>

            <div class="form-group full">
              <div class="inline-actions">
                <button class="btn btn-primary" id="verifyOtpBtn" type="submit">Verify OTP</button>
                <button class="btn btn-secondary" id="resendOtpBtn" type="button">Resend OTP</button>
              </div>
            </div>
          </form>
        </div>
      </div>
    </section>
  </main>

  <div id="footer"></div>

  <script src="assets/js/api.js"></script>
  <script src="assets/js/recommendation.js"></script>
  <script src="assets/js/main.js"></script>
  <script src="assets/js/auth.js"></script>
</body>
</html>
