<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>RestaurantHub - Register</title>
  <link rel="stylesheet" href="assets/css/style.css">
</head>
<body>
  <div id="navbar"></div>
  
  <main class="container">
    <section class="auth-box">
      <div class="form-card">
        <h1 class="page-title">Register</h1>
        <p class="page-subtitle">Create an account for ordering and recommendations.</p>
        <div id="authMessage" class="message hide"></div>

        <form id="registerForm" class="form-grid">
          <div class="form-group full">
            <label for="registerName">Full Name</label>
            <input id="registerName" type="text" required>
          </div>
          <div class="form-group full">
            <label for="registerEmail">Email</label>
            <input id="registerEmail" type="email" required>
          </div>
          <div class="form-group full">
            <label for="registerPassword">Password</label>
            <input id="registerPassword" type="password" required>
          </div>
          <div class="form-group full">
            <label for="preferredCategory">Preferred Category</label>
            <select id="preferredCategory">
              <option value="">No preference</option>
              <option value="Pizza">Pizza</option>
              <option value="Burger">Burger</option>
              <option value="Pasta">Pasta</option>
              <option value="Dessert">Dessert</option>
              <option value="Drinks">Drinks</option>
            </select>
          </div>
          <div class="form-group full">
            <button class="btn btn-primary" type="submit">Register</button>
          </div>
        </form>
      </div>
    </section>
  </main>

  <div id="footer"></div>

  <script src="assets/js/api.js"></script>
  <script src="assets/js/recommendation.js"></script>
  <script src="assets/js/main.js"></script>
  <script src="assets/js/auth.js"></script>
</body>
</html>
