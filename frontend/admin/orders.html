<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>RestaurantHub - Admin Orders</title>
  <link rel="stylesheet" href="../assets/css/style.css">
</head>
<body>
  <div id="navbar"></div>

  <main class="container">
    <div class="page-header">
      <h1 class="page-title">Admin Order Management</h1>
      <p class="page-subtitle">View and update customer order statuses.</p>
    </div>

    <div id="adminOrderMessage" class="message hide"></div>

    <section class="section">
      <div class="toolbar">
        <select id="orderStatusFilter">
          <option value="">All Statuses</option>
          <option value="pending">Pending</option>
          <option value="confirmed">Confirmed</option>
          <option value="preparing">Preparing</option>
          <option value="ready">Ready</option>
          <option value="completed">Completed</option>
          <option value="cancelled">Cancelled</option>
        </select>

        <select id="orderTypeFilter">
          <option value="">All Order Types</option>
          <option value="delivery">Delivery</option>
          <option value="pickup">Pickup</option>
        </select>

        <button class="btn btn-primary" id="refreshOrdersBtn" type="button">Refresh</button>
      </div>

      <div id="adminOrdersTable"></div>
    </section>
  </main>

  <div id="footer"></div>

  <script src="../assets/js/api.js"></script>
  <script src="../assets/js/recommendation.js"></script>
  <script src="../assets/js/main.js"></script>
  <script src="../assets/js/admin-orders.js"></script>
</body>
</html>
