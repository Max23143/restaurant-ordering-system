<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>RestaurantHub - Admin Bookings</title>
  <link rel="stylesheet" href="../assets/css/style.css">
</head>
<body>
  <div id="navbar"></div>

  <main class="container">
    <div class="page-header">
      <h1 class="page-title">Admin Booking Management</h1>
      <p class="page-subtitle">View and update customer booking statuses.</p>
    </div>

    <div id="adminBookingMessage" class="message hide"></div>

    <section class="section">
      <div class="toolbar">
        <select id="bookingStatusFilter">
          <option value="">All Statuses</option>
          <option value="pending">Pending</option>
          <option value="confirmed">Confirmed</option>
          <option value="cancelled">Cancelled</option>
          <option value="completed">Completed</option>
        </select>

        <input id="bookingDateFilter" type="date">

        <button class="btn btn-primary" id="refreshBookingsBtn" type="button">Refresh</button>
      </div>

      <div id="adminBookingsTable"></div>
    </section>
  </main>

  <div id="footer"></div>

  <script src="../assets/js/api.js"></script>
  <script src="../assets/js/recommendation.js"></script>
  <script src="../assets/js/main.js"></script>
  <script src="../assets/js/admin-bookings.js"></script>
</body>
</html>
