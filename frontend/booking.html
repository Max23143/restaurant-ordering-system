<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>RestaurantHub - Booking</title>
  <link rel="stylesheet" href="assets/css/style.css">
</head>
<body>
  <div id="navbar"></div>

  <main class="container">
    <section class="page-header">
      <h1 class="page-title">Book a Table</h1>
      <p class="page-subtitle">Reserve your dining slot through the restaurant booking module.</p>
    </section>

    <section class="form-card">
      <div id="bookingMessage" class="message hide"></div>

      <form id="bookingForm" class="form-grid" novalidate>
        <div class="form-group">
          <label for="fullName">Full Name</label>
          <input id="fullName" type="text" required>
        </div>

        <div class="form-group">
          <label for="email">Email</label>
          <input id="email" type="email" required>
        </div>

        <div class="form-group">
          <label for="phone">Phone</label>
          <input id="phone" type="text" required>
        </div>

        <div class="form-group">
          <label for="bookingDate">Booking Date</label>
          <input id="bookingDate" type="date" required>
        </div>

        <div class="form-group">
          <label for="bookingTime">Booking Time</label>
          <input id="bookingTime" type="time" required>
        </div>

        <div class="form-group">
          <label for="numberOfGuests">Number of Guests</label>
          <input id="numberOfGuests" type="number" min="1" required>
        </div>

        <div class="form-group full">
          <label for="notes">Notes</label>
          <textarea id="notes" rows="4" placeholder="Optional notes or special requests"></textarea>
        </div>

        <div class="form-group full">
          <div class="inline-actions">
            <button class="btn btn-primary" id="bookingSubmitBtn" type="submit">Submit Booking</button>
            <button class="btn btn-secondary hide" id="cancelBookingEditBtn" type="button" onclick="resetBookingForm()">Cancel Edit</button>
          </div>
        </div>
      </form>
    </section>

    <section class="section">
      <h2 class="section-title">My Bookings</h2>
      <div id="myBookingsContainer"></div>
    </section>
  </main>

  <div id="footer"></div>

  <script src="assets/js/api.js"></script>
  <script src="assets/js/recommendation.js"></script>
  <script src="assets/js/main.js"></script>
  <script src="assets/js/booking.js"></script>
</body>
</html>
