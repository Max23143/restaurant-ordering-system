<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>RestaurantHub - Reset Password</title>
  <link rel="stylesheet" href="assets/css/style.css">
</head>
<body>
  <div id="navbar"></div>

  <main class="container">
    <section class="auth-box">
      <div class="form-card">
        <h1 class="page-title">Reset Password</h1>
        <p class="page-subtitle">Enter your new password below.</p>

        <div id="resetPasswordMessage" class="message hide"></div>

        <form id="resetPasswordForm" class="form-grid" novalidate>
          <div class="form-group full">
            <label for="resetPasswordInput">New Password</label>
            <input id="resetPasswordInput" type="password" required>

            <div id="resetPasswordStrengthBox" class="password-strength-box">
              <div class="password-strength-top">
                <span>Password Strength:</span>
                <span id="resetPasswordStrengthText" class="password-strength-text weak">Weak</span>
              </div>

              <div class="password-strength-bar">
                <div id="resetPasswordStrengthFill" class="password-strength-fill weak"></div>
              </div>

              <ul id="resetPasswordSuggestions" class="password-suggestion-list">
                <li data-rule="length">At least 8 characters</li>
                <li data-rule="uppercase">At least 1 uppercase letter</li>
                <li data-rule="lowercase">At least 1 lowercase letter</li>
                <li data-rule="number">At least 1 number</li>
                <li data-rule="special">At least 1 special character</li>
              </ul>
            </div>
          </div>

          <div class="form-group full">
            <button class="btn btn-primary" id="resetPasswordBtn" type="submit">Reset Password</button>
          </div>
        </form>
      </div>
    </section>
  </main>

  <div id="footer"></div>

  <script src="assets/js/api.js"></script>
  <script src="assets/js/recommendation.js"></script>
  <script src="assets/js/main.js"></script>
  <script src="assets/js/auth.js"></script>
</body>
</html>
